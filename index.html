<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usman Rafaqat | Portfolio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --bg:#0a1020;
  --card:rgba(255,255,255,0.08);
  --text:#ffffff;
  --p:#7c3aed;
  --s:#22d3ee;
}

/* LIGHT MODE */
.light{
  --bg:#f5f7ff;
  --card:rgba(0,0,0,0.06);
  --text:#0a1020;
  --p:#7c3aed;
  --s:#22d3ee;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
  scroll-behavior:smooth;
  transition:0.4s;
}

 /* ================= BACKGROUND CANVAS ================= */
 #bgCanvas{
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        z-index:-3;
    }

    #matrix{
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        z-index:-2;
    }

    #particles-js{
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        z-index:-1;
    }

/* ================= LOGO ================= */
.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:bold;
  font-size:18px;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid var(--s);
  box-shadow: 0 0 10px var(--s);
  background: var(--card);
  backdrop-filter: blur(12px);
  transition: 0.4s;
  transform-style: preserve-3d;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  text-align: center;
  width: 50%;
  height: 50%;
  background: linear-gradient(135deg, var(--p), var(--s));
  backdrop-filter:blur(12px);
  transition:0.4s;
  transform-style:preserve-3d;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}
.logo:hover{
  width: 50%;
  height: 50%;
  background: linear-gradient(135deg, var(--p), var(--s));
  backdrop-filter:blur(12px);
  transition:0.4s;
  transform-style:preserve-3d;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.logo-box{
  width:35px;
  height:35px;
  border-radius:10px;
  background:linear-gradient(135deg,var(--p),var(--s));
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  color:white;
  box-shadow:0 0 20px rgba(124,58,237,0.5);
  /* width: 50%; */
  /* height: 50%; */
  background: linear-gradient(135deg, var(--p), var(--s));
  backdrop-filter:blur(12px);
  transition:0.4s;
  transform-style:preserve-3d;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  border-radius:10px;
  border:1px solid var(--s);
  box-shadow:0 0 10px var(--s);
  background:var(--card);
  backdrop-filter:blur(12px);
  transition:0.4s;
  transform-style:preserve-3d;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.logo-box:hover{
  width: 30%;
  height: 100%;
  background: linear-gradient(135deg, var(--p), var(--s));
  backdrop-filter:blur(12px);
  transition:0.4s;
  transform-style:preserve-3d;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  border-radius:10px;
  border:1px solid var(--s);
  box-shadow:0 0 10px var(--s);
  background:var(--card);
  backdrop-filter:blur(12px);
  transition:0.4s;
  transform-style:preserve-3d;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  text-align:center;
  color:var(--text);
  padding: 5px;
}

.logo-box,
.logo-box:hover{
  width:35px !important;
  height:35px !important;
  min-width:35px;
  min-height:35px;
  padding:0 !important;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

/* NAVBAR */
nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  backdrop-filter:blur(15px);
  background:rgba(0,0,0,0.25);
  z-index:1000;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid var(--s);
  box-shadow: 0 0 10px var(--s);
  background: var(--card);
  backdrop-filter: blur(12px);
  transition: 0.4s;
  transform-style: preserve-3d;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  text-align: center;
  /* width: 50%; */
  /* height: 50%; */
  background: linear-gradient(135deg, var(--p), var(--s));
  backdrop-filter:blur(12px);
  transition:0.4s;
  transform-style:preserve-3d;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

nav a{
  color:var(--text);
  margin:0 10px;
  text-decoration:none;
  transition:0.3s;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid var(--s);
  box-shadow: 0 0 10px var(--s);
  background: var(--card);
  backdrop-filter: blur(12px);
  transition: 0.4s;
  transform-style: preserve-3d;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  text-align: center;
  width: 50%;
  height: 50%;
  background: linear-gradient(135deg, var(--p), var(--s));
}
nav a:hover{
  color:var(--s);
  width: 50%;
  height: 50%;
  background: linear-gradient(135deg, var(--p), var(--s));
  backdrop-filter:blur(12px);
  transition:0.4s;
  transform-style:preserve-3d;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  border-radius:10px;
  border:1px solid var(--s);
  box-shadow:0 0 10px var(--s);
  background:var(--card);
  backdrop-filter:blur(12px);
  transition:0.4s;
  transform-style:preserve-3d;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  text-align:center;
  padding: 10px;
}

.toggle{
  cursor:pointer;
  padding:6px 10px;
  background:var(--card);
  border-radius:8px;
  width: 50%;
  height: 50%;
  background: linear-gradient(135deg, var(--p), var(--s));
  backdrop-filter:blur(12px);
  transition:0.4s;
  transform-style:preserve-3d;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  border-radius:10px;
  border:1px solid var(--s);
  box-shadow:0 0 10px var(--s);
  background:var(--card);
  backdrop-filter:blur(12px);
  transition:0.4s;
  transform-style:preserve-3d;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  text-align:center;
  padding: 10px;
}

.toggle:hover{
  width: 50%;
  height: 50%;
  background: linear-gradient(135deg, var(--p), var(--s));
  backdrop-filter:blur(12px);
  transition:0.4s;
  transform-style:preserve-3d;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.toggle{
  width:auto !important;
  height:auto !important;
  padding:6px 10px !important;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}

.toggle:hover{
  width:auto !important;
  height:auto !important;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:3rem;
  animation:float 4s infinite ease-in-out;
  text-align:center;
  margin-top:10px;
  margin-bottom:10px;
  margin-left:10px;
  margin-right:10px;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--s);
  box-shadow:0 0 10px var(--s);
  background:var(--card);
  backdrop-filter:blur(12px);
  transition:0.4s;
  transform-style:preserve-3d;
  transform:rotateX(8deg) rotateY(8deg) translateY(-10px);
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  text-align:center;
  width: 50%;
}

.hero h1:hover{
  width: 50%;
  height: 20%;
  background: linear-gradient(135deg, var(--p), var(--s));
  backdrop-filter:blur(12px);
  transition:0.4s;
  transform-style:preserve-3d;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.hero h2{
  color:var(--s);
  font-size:1.5rem;
  animation:float 4s infinite ease-in-out;
  text-align:center;
  margin-top:10px;
  margin-bottom:10px;
  margin-left:10px;
  margin-right:10px;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--s);
  box-shadow:0 0 10px var(--s);
  background:var(--card);
  backdrop-filter:blur(12px);
  transition:0.4s;
  transform-style:preserve-3d;
  transform:rotateX(8deg) rotateY(8deg) translateY(-10px);
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  width: 50%;
}

.hero h2:hover{
  width: 50%;
  height: 20%;
  background: linear-gradient(135deg, var(--p), var(--s));
  backdrop-filter:blur(12px);
  transition:0.4s;
  transform-style:preserve-3d;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.typing{
  border-right:2px solid var(--text);
  white-space:nowrap;
  overflow:hidden;
  width:0;
  animation:type 4s steps(40) infinite;
  text-align:center;
  margin-top:10px;
  margin-bottom:10px;
  margin-left:10px;
  margin-right:10px;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--s);
  box-shadow:0 0 10px var(--s);
  background:var(--card);
  backdrop-filter:blur(12px);
  transition:0.4s;
  transform-style:preserve-3d;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.img img{
  width:200px;
  height:200px; 
  border-radius:50%; 
  border:5px solid var(--s); 
  box-shadow:0 0 20px var(--s); 
  margin-top:20px; 
  margin-bottom:30px;
}

.img img:hover{
  width: 300px;
  height: 300px;
  border-radius: 50%;
  border: 5px solid var(--s);
  box-shadow: 0 0 20px var(--s);
  transition: all 1s ease-in-out;
} 

.img p{
  color: var(--s); 
  font-size: large; 
  width: 20%; 
  background:linear-gradient(90deg,var(--p),var(--s)); 
  padding:10px; border:1px solid var(--s); 
  border-radius: 10px; 
  box-shadow:0 0 10px var(--s); 
  backdrop-filter:blur(12px); 
  transition:0.4s; 
  transform-style:preserve-3d; 
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* SECTIONS */
section{
  padding:80px 10%;
  text-align:center;
  margin-top:10px;
  margin-bottom:10px;
  margin-left:10px;
  margin-right:10px;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--s);
  box-shadow:0 0 10px var(--s);
  background:var(--card);
  backdrop-filter:blur(12px);
  transition:0.4s;
  transform-style:preserve-3d;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* GLASS CARD */
.card{
  background:var(--card);
  padding:20px;
  border-radius:16px;
  backdrop-filter:blur(12px);
  transition:0.4s;
  transform-style:preserve-3d;
  text-align:center;
  margin-top:20px;
  margin-bottom:10px;
  margin-left:10px;
  margin-right:10px;
  border:1px solid var(--s);
  box-shadow:0 0 10px var(--s);
  backdrop-filter:blur(12px);
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.card:hover{
  transform:rotateX(8deg) rotateY(8deg) translateY(-10px);
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  background: var(--card);
  backdrop-filter:blur(12px);
  transition:0.4s;
  transform-style:preserve-3d;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  text-align:center;
  padding: 10px;
  border-radius:10px;
  border:1px solid var(--s);
  box-shadow:0 0 10px var(--s);
  background:var(--card);
  backdrop-filter:blur(12px);
  transition:0.4s;
  transform-style:preserve-3d;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  background: var(--card);
  backdrop-filter:blur(12px);
  transition:0.4s;
  transform-style:preserve-3d;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  text-align:center;
  padding: 10px;
  border-radius:10px;
  border:1px solid var(--s);
  box-shadow:0 0 10px var(--s);
  background:var(--card);
  backdrop-filter:blur(12px);
  transition:0.4s;
  transform-style:preserve-3d;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* BUTTON */
button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,var(--p),var(--s));
  color:white;
  cursor:pointer;
  backdrop-filter:blur(12px);
  transition:scale(1.05);
  transform-style:preserve-3d;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  text-align:center;
  padding: 10px;
  border-radius:10px;
  border:1px solid var(--s);
  box-shadow:0 0 10px var(--s);
  transform-style:preserve-3d;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}
button:hover{
  transform:scale(1.05);
  background: linear-gradient(135deg, var(--p), var(--s));
  backdrop-filter:blur(12px);
  transition:0.4s;
  transform-style:preserve-3d;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  border-radius:10px;
  border:1px solid var(--s);
  box-shadow:0 0 10px var(--s);
  background:var(--card);
  backdrop-filter:blur(12px);
  transition:0.4s;
  transform-style:preserve-3d;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  text-align:center;
  padding: 10px;
}
